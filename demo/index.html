<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Acme — Account settings (demo)</title>
    <style>
      /* A deliberately good-looking mock product page. It looks fine at rest;
         several interactive states hide WCAG contrast failures that the
         A11y State Contrast Checker reveals. Used only for store screenshots. */
      :root {
        --ink: #0f172a;
        --muted: #475569;
        --line: #e2e8f0;
        --blue: #2563eb;
        --blue-dark: #1d4ed8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        color: var(--ink);
        background: linear-gradient(135deg, #eef2ff 0%, #f8fafc 45%, #ecfeff 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px 20px;
      }
      .card {
        width: 100%;
        max-width: 620px;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: 0 20px 50px -24px rgba(15, 23, 42, 0.35);
        overflow: hidden;
      }
      .card-head {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 22px 28px;
        border-bottom: 1px solid var(--line);
      }
      .logo {
        width: 34px; height: 34px; border-radius: 9px;
        background: linear-gradient(135deg, var(--blue), #06b6d4);
        display: grid; place-items: center; color: #fff; font-weight: 800;
      }
      .card-head h1 { font-size: 17px; margin: 0; }
      .card-head p { font-size: 13px; color: var(--muted); margin: 2px 0 0; }

      .tabs { display: flex; gap: 4px; padding: 10px 20px 0; border-bottom: 1px solid var(--line); }
      .tab {
        padding: 10px 14px; font-size: 14px; color: var(--muted);
        text-decoration: none; border-radius: 8px 8px 0 0; border-bottom: 2px solid transparent;
      }
      .tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }
      /* Good focus ring on tabs. */
      .tab:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }

      .body { padding: 24px 28px 28px; }
      .field { margin-bottom: 18px; }
      label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
      input, select {
        width: 100%; font-size: 14px; padding: 10px 12px;
        border: 1px solid #cbd5e1; border-radius: 9px; color: var(--ink); background: #fff;
      }
      /* Email: strong, accessible focus ring (PASS). */
      #email:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; border-color: var(--blue); }
      /* Password: faint focus ring (FAIL 1.4.11). */
      #password:focus-visible { outline: 2px solid #cddcf7; outline-offset: 2px; }
      /* Select: strong ring (PASS). */
      #plan:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }

      .row { display: flex; gap: 12px; }
      .row .field { flex: 1; }

      .links { margin: 4px 0 22px; }
      .link { font-size: 13px; color: var(--blue); text-decoration: none; }
      /* Forgot-password link: washes out on hover (FAIL 1.4.3). */
      .link:hover { color: #aac4f2; }
      .link:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }

      .toolbar { display: flex; align-items: center; gap: 8px; margin: 6px 0 24px; }
      .toolbar-label { font-size: 13px; color: var(--muted); margin-right: 4px; }
      .icon-btn {
        width: 38px; height: 38px; display: grid; place-items: center;
        background: #fff; border: 1px solid var(--line); border-radius: 9px;
        color: #475569; cursor: pointer;
      }
      .icon-btn svg { width: 18px; height: 18px; fill: currentColor; }
      /* Edit & share: darken on hover (PASS 1.4.11 icon). */
      #edit:hover, #share:hover { color: #0f172a; background: #f1f5f9; }
      /* Delete: icon washes out on hover (FAIL 1.4.11 icon). */
      #delete:hover { color: #e9edf2; background: #fff; }
      .icon-btn:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }

      .actions { display: flex; gap: 10px; padding-top: 6px; border-top: 1px solid var(--line); margin-top: 4px; padding-top: 20px; }
      .btn {
        font-size: 14px; font-weight: 600; padding: 10px 18px; border-radius: 10px;
        cursor: pointer; border: 1px solid transparent;
      }
      .btn-primary { background: var(--blue); color: #fff; }
      /* Primary: stays high-contrast on hover (PASS 1.4.3). */
      .btn-primary:hover { background: var(--blue-dark); }
      .btn-primary:focus-visible { outline: 2px solid #93c5fd; outline-offset: 2px; }
      .btn-ghost { background: #fff; color: #334155; border-color: #cbd5e1; }
      /* Ghost: text washes out on hover (FAIL 1.4.3). */
      .btn-ghost:hover { color: #c4cad2; }
      .btn-ghost:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }

      .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="card-head">
        <div class="logo">A</div>
        <div>
          <h1>Acme — Account settings</h1>
          <p>Manage your profile, security and billing.</p>
        </div>
      </div>

      <nav class="tabs" aria-label="Settings sections">
        <a class="tab active" id="tab-profile" href="#profile">Profile</a>
        <a class="tab" id="tab-security" href="#security">Security</a>
        <a class="tab" id="tab-billing" href="#billing">Billing</a>
      </nav>

      <div class="body">
        <div class="field">
          <label for="email">Email address</label>
          <input id="email" type="email" value="ada@acme.io" />
        </div>

        <div class="row">
          <div class="field">
            <label for="password">Password</label>
            <input id="password" type="password" value="correcthorse" />
          </div>
          <div class="field">
            <label for="plan">Plan</label>
            <select id="plan">
              <option>Starter</option>
              <option selected>Team</option>
              <option>Enterprise</option>
            </select>
          </div>
        </div>

        <div class="links">
          <a class="link" id="forgot" href="#reset">Forgot your password?</a>
        </div>

        <div class="toolbar">
          <span class="toolbar-label">Quick actions:</span>
          <button id="edit" class="icon-btn" aria-label="Edit profile">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
          </button>
          <button id="share" class="icon-btn" aria-label="Share profile">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81a3 3 0 1 0-3-3c0 .24.04.47.09.7L8.04 9.81A3 3 0 1 0 6 15a3 3 0 0 0 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65a2.92 2.92 0 1 0 2.92-2.92z"/></svg>
          </button>
          <button id="delete" class="icon-btn" aria-label="Delete account">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 19a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
          </button>
        </div>

        <div class="actions">
          <button class="btn btn-primary" id="save">Save changes</button>
          <button class="btn btn-ghost" id="cancel">Cancel</button>
        </div>
        <p class="hint">Everything on this page looks fine at rest — run the audit to reveal the hover/focus contrast issues.</p>
      </div>
    </main>
  </body>
</html>
